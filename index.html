<html lang="en">
<head>
<meta charset="UTF-8">
<title>TGT 2026 — Sponsor Outreach</title>

<link rel="icon" type="image/png" sizes="192x192" href="icons/favicon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#191347">

<style>
  :root{
    --bg:#F7F5F1;
    --surface:#FFFFFF;
    --ink:#191347;
    --charcoal:#2B2829;
    --muted:#83808c;
    --line:#E7E2D8;
    --orange:#E45927;
    --amber:#F58420;
    --gold:#FDB715;
    --yellow:#FAD506;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--charcoal);
    font-family:'Manrope',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{display:flex;height:100vh;overflow:hidden;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:300px;flex:none;background:var(--surface);border-right:1px solid var(--line);
    display:flex;flex-direction:column;height:100%;
  }
  .sidebar-header{padding:16px 16px 10px;border-bottom:1px solid var(--line);}
  .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
  .brand-row img{width:30px;height:30px;border-radius:8px;flex:none;}
  .sidebar-header h1{font-size:16px;font-weight:800;color:var(--ink);margin:0;letter-spacing:-.01em;line-height:1.15;}
  .sidebar-header .sub{font-size:11.5px;color:var(--muted);font-weight:600;margin-left:40px;}
  .sync-status{font-size:10.5px;font-weight:700;margin-top:6px;display:flex;align-items:center;gap:5px;}
  .sync-dot{width:6px;height:6px;border-radius:50%;flex:none;}
  .sync-status.ok .sync-dot{background:#1E8E5A;}
  .sync-status.ok{color:#1E8E5A;}
  .sync-status.syncing .sync-dot, .sync-status.loading .sync-dot{background:var(--amber);}
  .sync-status.syncing, .sync-status.loading{color:var(--amber);}
  .sync-status.error .sync-dot{background:var(--orange);}
  .sync-status.error{color:var(--orange);}
  .nav-row{display:flex;gap:6px;padding:12px 16px 6px;}
  .nav-btn{
    flex:1;font-family:inherit;font-size:12px;font-weight:800;padding:8px 6px;border-radius:9px;
    border:1px solid var(--line);background:#fff;color:var(--charcoal);cursor:pointer;text-align:center;
  }
  .nav-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .add-btn-side{
    margin:8px 16px 10px;background:var(--orange);color:#fff;border:none;padding:9px;border-radius:9px;
    font-weight:800;font-size:12.5px;cursor:pointer;
  }
  .add-btn-side:hover{opacity:.92;}
  .side-filters{display:flex;gap:6px;padding:0 16px 10px;}
  .side-filters select{
    flex:1;font-family:inherit;font-size:11.5px;font-weight:700;border-radius:8px;
    border:1px solid var(--line);background:#fff;padding:6px 6px;color:var(--charcoal);min-width:0;
  }
  .contact-list{flex:1;overflow-y:auto;padding:4px 8px 16px;}
  .contact-row{
    display:flex;align-items:center;gap:9px;padding:9px 8px;border-radius:10px;cursor:pointer;
    margin-bottom:2px;
  }
  .contact-row:hover{background:#F7F5F1;}
  .contact-row.selected{background:#EFEBFB;}
  .contact-row.committed{background:#EAF7EF;}
  .contact-row.committed:hover{background:#DEF2E6;}
  .contact-row.committed.selected{background:#D2EEDD;}
  .contact-row .pdot{width:7px;height:7px;border-radius:50%;flex:none;}
  .contact-row .crow-main{flex:1;min-width:0;}
  .contact-row .crow-name{font-size:13px;font-weight:700;color:var(--charcoal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .contact-row .crow-sub{font-size:10.5px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .crow-status{width:9px;height:9px;border-radius:50%;flex:none;}
  .crow-urgent{width:6px;height:6px;border-radius:50%;background:var(--orange);flex:none;}
  .empty-list{padding:20px 12px;font-size:12.5px;color:var(--muted);font-style:italic;}

  /* ---------- Main pane ---------- */
  .main{flex:1;overflow-y:auto;height:100%;}
  .main-inner{max-width:820px;margin:0 auto;padding:24px 28px 80px;}

  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
  .title-block h2{font-size:20px;font-weight:800;color:var(--ink);margin:0 0 2px;letter-spacing:-0.01em;}
  .title-block .sub{font-size:13px;color:var(--muted);font-weight:600;}
  .countdown{background:var(--ink);color:#fff;border-radius:14px;padding:10px 18px;text-align:center;min-width:110px;}
  .countdown .num{font-size:22px;font-weight:800;line-height:1;}
  .countdown .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.75;margin-top:3px;}

  .today-banner{
    background:#fff;border:1.5px solid var(--orange);border-radius:14px;padding:12px 16px;margin-bottom:16px;
    display:flex;gap:12px;align-items:center;
  }
  .today-banner .dot{width:9px;height:9px;border-radius:50%;background:var(--orange);flex:none;box-shadow:0 0 0 4px rgba(228,89,39,.15);}
  .today-banner .txt{font-size:13.5px;font-weight:600;color:var(--charcoal);}
  .today-banner .txt b{color:var(--orange);}

  .progress-card{background:var(--surface);border-radius:16px;padding:20px 22px;margin-bottom:16px;border:1px solid var(--line);}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .progress-figure{font-size:28px;font-weight:800;color:var(--ink);}
  .progress-figure span{font-size:14px;font-weight:600;color:var(--muted);}
  .progress-targets{font-size:12px;color:var(--muted);font-weight:600;text-align:right;}
  .bar-track{position:relative;height:16px;background:#F0ECE3;border-radius:8px;overflow:visible;margin:10px 0 26px;}
  .bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gold),var(--orange));transition:width .4s ease;}
  .tick{position:absolute;top:-6px;bottom:-6px;width:2px;background:var(--charcoal);opacity:.35;}
  .tick .tick-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--charcoal);white-space:nowrap;opacity:.7;}
  .status-strip{display:flex;flex-wrap:wrap;gap:8px;}
  .status-chip{border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;background:#fff;cursor:pointer;color:var(--charcoal);display:flex;gap:6px;align-items:center;}
  .status-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .status-chip .count{opacity:.65;font-weight:600;}

  .section-head{display:flex;justify-content:space-between;align-items:center;margin:24px 0 10px;}
  .section-head h3{font-size:13.5px;font-weight:800;color:var(--ink);margin:0;text-transform:uppercase;letter-spacing:.04em;}
  .section-head .count-badge{font-size:12px;font-weight:700;color:var(--muted);}

  .action-row{
    background:var(--surface);border-radius:12px;border:1px solid var(--line);padding:11px 14px;
    display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;border-left:4px solid var(--line);
  }
  .action-row.overdue{border-left-color:var(--orange);}
  .action-row.today{border-left-color:var(--amber);}
  .action-row.soon{border-left-color:var(--gold);}
  .action-row:hover{background:#FFFDF9;}
  .action-when{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;min-width:74px;color:var(--muted);}
  .action-row.overdue .action-when{color:var(--orange);}
  .action-row.today .action-when{color:var(--amber);}
  .action-body{flex:1;min-width:0;}
  .action-name{font-weight:700;font-size:13.5px;color:var(--charcoal);}
  .action-next{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty-note{font-size:13px;color:var(--muted);font-style:italic;padding:10px 2px;}

  .activity-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #F0ECE3;font-size:12.5px;}
  .activity-row:last-child{border-bottom:none;}
  .activity-time{color:var(--muted);font-weight:700;min-width:64px;font-size:11px;text-transform:uppercase;}
  .activity-text{color:var(--charcoal);}

  /* ---------- Contact detail page ---------- */
  .detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:6px;flex-wrap:wrap;}
  .detail-title-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .detail-title-row .priority-dot{width:9px;height:9px;border-radius:50%;}
  .priority-High{background:var(--orange);}
  .priority-Medium{background:var(--amber);}
  .priority-Low{background:var(--gold);}
  .detail-name{font-size:22px;font-weight:800;color:var(--ink);}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:#F0ECE3;color:var(--charcoal);white-space:nowrap;}
  .badge.status-pill{color:#fff;}
  .detail-sub{font-size:13px;color:var(--muted);font-weight:600;margin:4px 0 16px;}
  .detail-ask{font-size:15px;font-weight:800;color:var(--ink);text-align:right;}
  .detail-ask .fb{display:block;font-size:11px;font-weight:600;color:var(--muted);}

  .quick-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .qbtn{font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--charcoal);}
  .qbtn:hover{background:#F7F5F1;}
  .qbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  .qbtn.commit{background:var(--gold);border-color:var(--gold);color:var(--charcoal);}
  .qbtn.decline{background:#fff;color:var(--muted);}
  .qbtn.ai{background:linear-gradient(90deg,#191347,#3a2f7a);color:#fff;border:none;display:inline-flex;align-items:center;gap:5px;}
  .qbtn.ai:hover{opacity:.92;}
  .qbtn[disabled]{opacity:.6;cursor:wait;}

  .ai-draft-panel{border:1px solid var(--line);border-radius:14px;padding:16px;background:#F7F5FF;margin-bottom:20px;}
  .ai-draft-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .ai-draft-head h4{margin:0;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink);}
  .ai-draft-panel textarea{width:100%;min-height:200px;font-family:inherit;font-size:13px;line-height:1.5;padding:10px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--charcoal);resize:vertical;}
  .ai-draft-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .ai-loading{font-size:12.5px;color:var(--muted);font-style:italic;padding:4px 2px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.grid2{grid-template-columns:1fr;}}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px;}
  .field input, .field select, .field textarea{width:100%;font-family:inherit;font-size:13px;padding:7px 9px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--charcoal);}
  .field textarea{resize:vertical;min-height:50px;}
  .full{grid-column:1/-1;}
  .detail-actions{display:flex;justify-content:space-between;margin-top:10px;}
  .save-btn{background:var(--ink);color:#fff;border:none;padding:9px 20px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;}
  .del-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;}

  /* ---------- Playbook page ---------- */
  .ref-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;}
  .ref-card h4{margin:0 0 10px;font-size:12.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink);}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{text-align:left;color:var(--muted);font-size:10.5px;text-transform:uppercase;padding:5px 6px;border-bottom:1px solid var(--line);}
  td{padding:7px 6px;border-bottom:1px solid #F0ECE3;}
  .step-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #F0ECE3;font-size:12.5px;}
  .step-row:last-child{border-bottom:none;}
  .step-num{font-weight:800;color:var(--orange);min-width:16px;}
  ul.notes{margin:0;padding-left:18px;font-size:12.5px;line-height:1.6;color:var(--charcoal);}

  #loading{padding:60px 0;text-align:center;color:var(--muted);font-weight:600;}
  #toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--charcoal);color:#fff;padding:9px 18px;border-radius:999px;font-size:12.5px;
    font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;
  }
  #toast.show{opacity:1;}

  @media(max-width:760px){
    #app{flex-direction:column;height:auto;overflow:visible;}
    .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--line);}
    .contact-list{max-height:260px;}
    .main{overflow:visible;height:auto;}
    .main-inner{padding:18px 16px 60px;}
  }
</style>
</head>

function relativeTime(iso){
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs/60000);
  if(mins < 1) return 'now';
  if(mins < 60) return mins+'m ago';
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return hrs+'h ago';
  const days = Math.floor(hrs/24);
  if(days < 7) return days+'d ago';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

async function loadData(){
  STATE.syncStatus = 'loading';
  render();
  try{
    const res = await fetch(`${SHEETDB_URL}/search?key=${ROW_KEY}`);
    if(!res.ok) throw new Error('SheetDB GET failed: ' + res.status);
    const rows = await res.json();
    if(Array.isArray(rows) && rows.length > 0 && rows[0].value){
      const parsed = JSON.parse(rows[0].value);
      STATE.contacts = parsed.contacts || JSON.parse(JSON.stringify(SEED_CONTACTS));
      STATE.config = parsed.config || CONFIG;
      STATE.activity = parsed.activity || [];
      STATE.syncStatus = 'ok';
      STATE.lastSync = new Date().toISOString();
    } else {
      // No row yet -- first time this sheet has been used. Seed it.
      STATE.contacts = JSON.parse(JSON.stringify(SEED_CONTACTS));
      STATE.config = CONFIG;
      STATE.activity = [];
      await saveData(true);
    }
  } catch(e){
    console.error('Load from SheetDB failed', e);
    STATE.syncStatus = 'error';
    // Fall back to in-memory defaults so the app is still usable, but nothing
    // will persist until the sheet connection is fixed.
    if(STATE.contacts.length === 0){
      STATE.contacts = JSON.parse(JSON.stringify(SEED_CONTACTS));
      STATE.config = CONFIG;
      STATE.activity = [];
    }
    showToast('Could not reach the tracker sheet — check connection');
  }
  render();
}

async function saveData(isInitialSeed){
  STATE.syncStatus = 'syncing';
  render();
  const payload = JSON.stringify({contacts:STATE.contacts, config:STATE.config, activity:STATE.activity});
  const nowIso = new Date().toISOString();
  try{
    if(isInitialSeed){
      const res = await fetch(SHEETDB_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ data: { key: ROW_KEY, value: payload, updated_at: nowIso } })
      });
      if(!res.ok) throw new Error('SheetDB POST failed: ' + res.status);
    } else {
      const res = await fetch(`${SHEETDB_URL}/key/${ROW_KEY}`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ data: { value: payload, updated_at: nowIso } })
      });
      if(!res.ok) throw new Error('SheetDB PATCH failed: ' + res.status);
      const result = await res.json();
      // SheetDB returns {updated: 0} if no row matched -- meaning the row
      // doesn't exist yet, so fall back to creating it.
      if(result && result.updated === 0){
        const createRes = await fetch(SHEETDB_URL, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ data: { key: ROW_KEY, value: payload, updated_at: nowIso } })
        });
        if(!createRes.ok) throw new Error('SheetDB fallback POST failed: ' + createRes.status);
      }
    }
    STATE.syncStatus = 'ok';
    STATE.lastSync = nowIso;
  } catch(e){
    console.error('Save to SheetDB failed', e);
    STATE.syncStatus = 'error';
    showToast('Save failed — changes are only local until this reconnects');
  }
  render();
}

function logActivity(text){
  STATE.activity.unshift({ts:new Date().toISOString(), text});
  STATE.activity = STATE.activity.slice(0,40);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}

function getContact(id){ return STATE.contacts.find(c=>c.id===id); }

function updateContact(id, patch){
  const c = getContact(id);
  if(!c) return;
  Object.assign(c, patch);
  saveData();
}

function selectView(v){ STATE.view = v; render(); }

function quickAction(id, action){
  const c = getContact(id);
  const today = todayStr();
  if(action==='sent'){ updateContact(id, {status:'Initial Email Sent', lastContacted:today}); logActivity(`Sent email — ${c.name}`); }
  if(action==='called'){ updateContact(id, {status:'Called', lastContacted:today}); logActivity(`Called — ${c.name}`); }
  if(action==='commit'){
    const amt = prompt('Committed amount ($)?', c.suggestedAsk || '');
    if(amt===null) return;
    updateContact(id, {status:'Committed', outcome:'Committed', committedAmount:Number(amt)||0, lastContacted:today});
    logActivity(`Committed ${fmtMoney(Number(amt)||0)} — ${c.name}`);
  }
  if(action==='decline'){ updateContact(id, {status:'Declined', outcome:'Declined', lastContacted:today}); logActivity(`Declined — ${c.name}`); }
  if(action==='followup'){ updateContact(id, {status:'Follow Up Later', outcome:'Follow Up Later'}); logActivity(`Pushed to follow up later — ${c.name}`); }
  saveData();
  showToast('Updated ' + c.name);
  render();
}

    packet:'', firstEmailDate:'', status:'Not Started', lastContacted:'', followUpDate:'', followUpMethod:'',
    outcome:'Open', committedAmount:'', silentAuction:'Maybe', nextAction:'Add contact info + personal notes.', notes:'', draftContent:'', draftFormat:'email'
  });

}

function deleteContact(id){
  const c = getContact(id);
  if(!confirm('Remove this contact from the tracker? This can\'t be undone.')) return;
  STATE.contacts = STATE.contacts.filter(x=>x.id!==id);
  logActivity(`Removed contact — ${c.name}`);
  STATE.view = 'dashboard';
  saveData();
  render();
}

function setTypeFilter(v){ STATE.typeFilter = v; render(); }
function setStatusFilter(v){ STATE.statusFilter = v; render(); }
function setSortFilter(v){ STATE.sortBy = v; render(); }

function computeActionUrgency(c){
  if(!c.followUpDate) return null;
  if(['Committed','Declined','Closed'].includes(c.status)) return null;
  const diff = daysBetween(todayStr(), c.followUpDate);
  if(diff < 0) return 'overdue';
  if(diff === 0) return 'today';
  if(diff <= 3) return 'soon';
  return 'upcoming';
}

function saveCardForm(id){
  const c = getContact(id);
  const prevStatus = c.status;
  const get = (field)=>document.getElementById(`f-${id}-${field}`).value;
  const patch = {
    name:get('name'), type:get('type'), htiPOC:get('htiPOC'),
    priorDonation:get('priorDonation'), suggestedAsk:get('suggestedAsk'), fallbackAsk:get('fallbackAsk'),
    priority:get('priority'), location:get('location'), contactName:get('contactName'), title:get('title'),
    email:get('email'), phone:get('phone'), personalNotes:get('personalNotes'), messageAngle:get('messageAngle'),
    packet:get('packet'), firstEmailDate:get('firstEmailDate'), status:get('status'), lastContacted:get('lastContacted'),
    followUpDate:get('followUpDate'), followUpMethod:get('followUpMethod'), outcome:get('outcome'),
    committedAmount:get('committedAmount'), silentAuction:get('silentAuction'), nextAction:get('nextAction'), notes:get('notes')
  };
  patch.priorDonation = patch.priorDonation===''?'':Number(patch.priorDonation);
  patch.suggestedAsk = patch.suggestedAsk===''?'':Number(patch.suggestedAsk);
  patch.fallbackAsk = patch.fallbackAsk===''?'':Number(patch.fallbackAsk);
  patch.committedAmount = patch.committedAmount===''?'':Number(patch.committedAmount);
  updateContact(id, patch);
  if(patch.status !== prevStatus) logActivity(`Status changed to "${patch.status}" — ${patch.name}`);
  else logActivity(`Updated details — ${patch.name}`);
  saveData();
  showToast('Saved ' + patch.name);
  render();
}

function buildDraftPrompt(c, feedback){
  const format = c.draftFormat || 'email';
  const stageGuidance = {
    'Not Started': "This is the FIRST-TOUCH contact. Open warmly, reference the personal connection if one exists, and make a clear, specific ask.",
    'Needs Personal Intel': "This is the FIRST-TOUCH contact. Keep it warm and simple since Mark doesn't have much personal history with this contact yet.",
    'Email Scheduled': "This is the FIRST-TOUCH contact, ready to go.",
    'Initial Email Sent': "This is a FOLLOW-UP / second-touch contact. Reference that Mark reached out before, keep it short and low-pressure, and gently re-surface the ask without sounding pushy.",
    'Called': "This is a FOLLOW-UP after a phone conversation. Reference the call briefly and confirm next steps or the ask.",
    'Visit Scheduled': "This is a short confirmation/logistics touch ahead of an in-person visit.",
    'Follow Up Later': "This is a gentle check-back after some time has passed. Keep it brief, low-pressure, and easy to say yes or no to.",
    'Committed': "This is a THANK-YOU / confirmation for a sponsorship they've already committed to. Confirm the amount and sponsor level, thank them warmly, and outline what happens next.",
    'Declined': "Do not make an ask. Keep it a short, gracious thank-you-for-considering-us note that leaves the door open for the future.",
    'Closed': "Keep it a short, gracious closing note."
  };
  const guidance = stageGuidance[c.status] || stageGuidance['Not Started'];
  const askAmount = c.status==='Committed' ? (c.committedAmount || c.suggestedAsk) : c.suggestedAsk;
  const fallback = c.fallbackAsk ? `If the full ask feels like too much, a fallback of $${c.fallbackAsk} (or a silent auction item) is a fine landing spot.` : '';

  const sharedContext = `You are helping Mark Williams, Executive Director of HUBZone Technology Initiative (HTI), a nonprofit in Henderson, NC that refurbishes donated laptops, distributes them free to students and families, and runs digital literacy programs. Mark is doing outreach for HTI's annual fundraiser, TGT 2026, happening September 19, 2026.

Match Mark's voice: direct, warm, plain-spoken, no corporate fundraising boilerplate, no over-explaining. Sound like a real person, not a template.

CONTACT: ${c.name}${c.contactName ? ' (contact: '+c.contactName+(c.title?', '+c.title:'')+')' : ' (no named contact yet -- speak to the organization generally)'}
RELATIONSHIP TYPE: ${c.type}
PERSONAL CONNECTION / NOTES: ${c.personalNotes || 'None on file -- keep it professional and warm rather than presuming familiarity.'}
MESSAGE ANGLE: ${c.messageAngle || 'General sponsorship ask.'}
PRIOR DONATION: ${c.priorDonation ? '$'+c.priorDonation+' (this is a renewal/upgrade conversation)' : 'None -- this is a new prospect.'}
THE ASK: $${askAmount || 550}. ${fallback}
CURRENT STAGE: ${c.status} -- ${guidance}

Sponsor levels for reference (name the specific level only if it helps, don't over-explain the tiers): Basic OS $550, Reboot $1,000, Powerhouse $5,000, Chromium $10,000.`;

  const formatSpec = {
    text: 'a TEXT MESSAGE Mark can send from his phone. Under 320 characters. No subject line, no formal salutation, no letter-style closing -- just a short, warm, direct message a person actually texts. One clear point or ask.',
    call: 'a short PHONE CALL TALK TRACK for Mark to glance at while dialing -- not a word-for-word script, but tight talking points: an opening line, 1-2 key points to hit, the specific ask stated plainly, and a natural closing line.',
    email: 'ONE short, personal sponsorship EMAIL. Short paragraphs, a subject line on the first line prefixed "Subject:", then a blank line, then the body.'
  }[format];

  const outputReminder = `No preamble, no explanation, no markdown formatting${format==='email' ? ', no signature block beyond "Mark" or "Mark Williams, HTI"' : ''}, no meta-commentary about what changed.`;

  // Targeted revision of an existing draft, using Mark's specific feedback
  if(feedback && feedback.trim() && c.draftContent){
    return `${sharedContext}

Mark already has this draft:
"""
${c.draftContent}
"""

He wants it revised with this specific feedback: "${feedback.trim()}"

Revise the draft to address that feedback directly, while keeping it ${formatSpec}

Output ONLY the revised version. ${outputReminder}`;
  }

  // Fresh generation
  return `${sharedContext}

Write ${formatSpec}

Output ONLY the ${DRAFT_FORMAT_LABEL[format].toLowerCase()} itself. ${outputReminder}`;
}

async function draftContentAI(id, feedback){
  const c = getContact(id);
  if(!c) return;
  draftLoadingIds.add(id);
  render();
  try{
    const response = await fetch("/api/draft", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: buildDraftPrompt(c, feedback) })
    });
    if(!response.ok){
      const errBody = await response.json().catch(()=>({}));
      throw new Error(errBody.error || ('Proxy returned ' + response.status));
    }
    const data = await response.json();
    const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
    if(!text) throw new Error('Empty response');
    updateContact(id, { draftContent: text });
    logActivity(`${feedback && feedback.trim() ? 'Revised' : 'Drafted'} ${DRAFT_FORMAT_LABEL[c.draftFormat||'email'].toLowerCase()} — ${c.name}`);
    saveData();
  } catch(e){
    console.error('Draft generation failed', e);
    showToast('Draft failed — check /api/draft setup');
  } finally {
    draftLoadingIds.delete(id);
    render();
  }
}

function setDraftFormat(id, format){
  updateContact(id, { draftFormat: format });
  render();
}

function copyDraft(id){
  const el = document.getElementById(`draft-${id}`);
  const c = getContact(id);
  const text = el ? el.value : (c ? c.draftContent : '');
  if(!text) return;
  navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard'))
    .catch(()=>showToast('Copy failed — select the text manually'));
}

function saveDraftEdit(id){
  const val = document.getElementById(`draft-${id}`).value;
  updateContact(id, { draftContent: val });
  showToast('Draft saved');
}

  const app = document.getElementById('app');
  app.innerHTML = `${renderSidebar()}<div class="main"><div class="main-inner">${renderMain()}</div></div>`;
}

function renderSidebar(){
  const contacts = STATE.contacts.slice();
  let visible = contacts;
  if(STATE.typeFilter!=='all') visible = visible.filter(c=>c.type===STATE.typeFilter);
  if(STATE.statusFilter!=='all') visible = visible.filter(c=>c.status===STATE.statusFilter);
  const priorityRank = {High:0,Medium:1,Low:2};
  if(STATE.sortBy==='followup') visible.sort((a,b)=>(a.followUpDate||'9999').localeCompare(b.followUpDate||'9999'));
  else if(STATE.sortBy==='name') visible.sort((a,b)=>a.name.localeCompare(b.name));
  else visible.sort((a,b)=>priorityRank[a.priority]-priorityRank[b.priority]);

  return `
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand-row">
        <img src="icons/favicon-192.png" alt="">
        <h1>TGT 2026</h1>
      </div>
      <div class="sub">Sponsor Outreach · Henderson, NC</div>
      <div class="sync-status ${STATE.syncStatus}">
        <div class="sync-dot"></div>
        ${STATE.syncStatus==='ok' ? 'Synced' + (STATE.lastSync ? ' ' + relativeTime(STATE.lastSync) : '') : ''}
        ${STATE.syncStatus==='syncing' ? 'Saving…' : ''}
        ${STATE.syncStatus==='loading' ? 'Loading…' : ''}
        ${STATE.syncStatus==='error' ? 'Sync failed — check connection' : ''}
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn ${STATE.view==='dashboard'?'active':''}" onclick="selectView('dashboard')">Dashboard</button>
      <button class="nav-btn ${STATE.view==='playbook'?'active':''}" onclick="selectView('playbook')">Playbook</button>
    </div>
    <button class="add-btn-side" onclick="addContact()">+ Add contact</button>
    <div class="side-filters">
      <select onchange="setTypeFilter(this.value)">
        <option value="all">All types</option>
        <option value="Renewal" ${STATE.typeFilter==='Renewal'?'selected':''}>Renewal</option>
        <option value="Renewal / Upgrade" ${STATE.typeFilter==='Renewal / Upgrade'?'selected':''}>Renewal/Upgrade</option>
        <option value="New Prospect" ${STATE.typeFilter==='New Prospect'?'selected':''}>New Prospect</option>
      </select>
      <select onchange="setSortFilter(this.value)">
        <option value="priority">Priority</option>
        <option value="followup">Follow-up</option>
        <option value="name">Name</option>
      </select>
    </div>
    <div class="contact-list">
      ${visible.length===0 ? '<div class="empty-list">No contacts match this filter.</div>' : ''}
      ${visible.map(c=>{
        const urgency = computeActionUrgency(c);
        return `
        <div class="contact-row ${STATE.view===c.id?'selected':''} ${c.status==='Committed'?'committed':''}" onclick="selectView('${c.id}')">
          <div class="pdot priority-${c.priority}"></div>
          <div class="crow-main">
            <div class="crow-name">${c.name}</div>
            <div class="crow-sub">${fmtMoney(c.suggestedAsk)} · ${c.status}</div>
          </div>
          ${urgency==='overdue' || urgency==='today' ? '<div class="crow-urgent"></div>' : ''}
          <div class="crow-status" style="background:${STATUS_COLOR[c.status]||'#83808c'}"></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderMain(){
  if(STATE.view==='dashboard') return renderDashboard();
  if(STATE.view==='playbook') return renderPlaybook();
  const c = getContact(STATE.view);
  if(!c){ STATE.view='dashboard'; return renderDashboard(); }
  return renderContactDetail(c);
}

function renderDashboard(){
  const contacts = STATE.contacts;
  const committedTotal = contacts.filter(c=>c.status==='Committed').reduce((sum,c)=>sum+(Number(c.committedAmount)||Number(c.suggestedAsk)||0),0);
  const daysToEvent = daysBetween(todayStr(), STATE.config.eventDate);
  const cadenceToday = CADENCE.find(s=>s.timing.includes('7/13'));

  const counts = {};
  STATUS_OPTIONS.forEach(s=>counts[s]=0);
  contacts.forEach(c=>counts[c.status]=(counts[c.status]||0)+1);

  const actionable = contacts.map(c=>({c, urgency:computeActionUrgency(c)})).filter(x=>x.urgency)
    .sort((a,b)=>(a.c.followUpDate||'9999').localeCompare(b.c.followUpDate||'9999'));
  const noDateContacts = contacts.filter(c=>!c.followUpDate && !['Committed','Declined','Closed'].includes(c.status));

  const barMax = STATE.config.stretchTarget * 1.05;
  const fillPct = Math.min(100, (committedTotal / barMax) * 100);
  const baselinePct = (STATE.config.baselineTarget / barMax) * 100;
  const suggestedPct = (STATE.config.suggestedTarget / barMax) * 100;
  const stretchPct = (STATE.config.stretchTarget / barMax) * 100;

  return `
    <div class="topbar">
      <div class="title-block">
        <h2>Dashboard</h2>
        <div class="sub">Event: ${fmtDateShort(STATE.config.eventDate)}, 2026</div>
      </div>
      <div class="countdown"><div class="num">${daysToEvent}</div><div class="lbl">days to TGT</div></div>
    </div>
    ${cadenceToday ? `<div class="today-banner"><div class="dot"></div><div class="txt"><b>Today's move (Step ${cadenceToday.step}):</b> ${cadenceToday.action}</div></div>` : ''}

    <div class="progress-card">
      <div class="progress-top">
        <div class="progress-figure">${fmtMoney(committedTotal)} <span>committed of ${fmtMoney(STATE.config.suggestedTarget)} suggested target</span></div>
        <div class="progress-targets">Baseline ${fmtMoney(STATE.config.baselineTarget)} &nbsp;·&nbsp; Stretch ${fmtMoney(STATE.config.stretchTarget)}</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${fillPct}%"></div>
        <div class="tick" style="left:${baselinePct}%"><span class="tick-label">Baseline</span></div>
        <div class="tick" style="left:${suggestedPct}%"><span class="tick-label">Suggested</span></div>
        <div class="tick" style="left:${stretchPct}%"><span class="tick-label">Stretch</span></div>
      </div>
      <div class="status-strip">
        ${STATUS_OPTIONS.filter(s=>counts[s]>0).map(s=>`<div class="status-chip ${STATE.statusFilter===s?'active':''}" onclick="setStatusFilter('${STATE.statusFilter===s?'all':s}')">${s} <span class="count">${counts[s]}</span></div>`).join('')}
      </div>
    </div>

    <div class="section-head"><h3>Next Actions</h3><div class="count-badge">${actionable.length + noDateContacts.length} pending</div></div>
    ${actionable.length===0 && noDateContacts.length===0 ? `<div class="empty-note">Nothing due — you're caught up.</div>` : ''}
    ${actionable.map(({c,urgency})=>`
      <div class="action-row ${urgency}" onclick="selectView('${c.id}')">
        <div class="action-when">${urgency==='overdue'?'Overdue':urgency==='today'?'Today':fmtDateShort(c.followUpDate)}</div>
        <div class="action-body"><div class="action-name">${c.name}</div><div class="action-next">${c.nextAction || 'No next action set'}</div></div>
        <div class="badge status-pill" style="background:${STATUS_COLOR[c.status]||'#83808c'}">${c.status}</div>
      </div>`).join('')}
    ${noDateContacts.map(c=>`
      <div class="action-row" onclick="selectView('${c.id}')">
        <div class="action-when">No date</div>
        <div class="action-body"><div class="action-name">${c.name}</div><div class="action-next">${c.nextAction || 'Set a follow-up date'}</div></div>
        <div class="badge status-pill" style="background:${STATUS_COLOR[c.status]||'#83808c'}">${c.status}</div>
      </div>`).join('')}

    <div class="section-head"><h3>Recent Activity</h3></div>
    <div class="card">
      ${STATE.activity.length===0 ? '<div class="empty-note">Nothing logged yet — actions you take (sending, calling, committing) will show up here.</div>' : ''}
      ${STATE.activity.slice(0,10).map(a=>`<div class="activity-row"><div class="activity-time">${relativeTime(a.ts)}</div><div class="activity-text">${a.text}</div></div>`).join('')}
    </div>
  `;
}

        <option value="call" ${c.draftFormat==='call'?'selected':''}>Call talk track</option>
      </select>
      <button class="qbtn ai" ${draftLoadingIds.has(c.id)?'disabled':''} onclick="draftContentAI('${c.id}')">✨ ${draftLoadingIds.has(c.id) ? 'Drafting…' : (c.draftContent ? 'Redraft '+DRAFT_FORMAT_LABEL[c.draftFormat||'email'] : 'Draft '+DRAFT_FORMAT_LABEL[c.draftFormat||'email'])}</button>
      <button class="qbtn primary" onclick="quickAction('${c.id}','sent')">Mark Sent</button>
      <button class="qbtn" onclick="quickAction('${c.id}','called')">Mark Called</button>
      <button class="qbtn commit" onclick="quickAction('${c.id}','commit')">Log Commitment</button>
      <button class="qbtn" onclick="quickAction('${c.id}','followup')">Push to Follow Up Later</button>
      <button class="qbtn decline" onclick="quickAction('${c.id}','decline')">Mark Declined</button>
    </div>

    ${draftLoadingIds.has(c.id) ? `<div class="ai-draft-panel"><div class="ai-loading">Drafting a ${DRAFT_FORMAT_LABEL[c.draftFormat||'email'].toLowerCase()} for ${c.name}…</div></div>` : ''}
    ${(!draftLoadingIds.has(c.id) && c.draftContent) ? `
    <div class="ai-draft-panel">
      <div class="ai-draft-head"><h4>AI Draft — ${DRAFT_FORMAT_LABEL[c.draftFormat||'email']} — edit freely before using</h4></div>
      <textarea id="draft-${c.id}">${c.draftContent}</textarea>
      <div class="field" style="margin-top:10px;">
        <label>Want changes on regenerate? Say what (optional)</label>
        <input id="feedback-${c.id}" type="text" placeholder="e.g. make it shorter / lean more on the van repair story / less formal">
      </div>
      <div class="ai-draft-actions">
        <button class="qbtn primary" onclick="saveDraftEdit('${c.id}')">Save edits</button>
        <button class="qbtn" onclick="copyDraft('${c.id}')">Copy to clipboard</button>
        <button class="qbtn ai" onclick="draftContentAI('${c.id}', document.getElementById('feedback-${c.id}').value)">✨ Regenerate</button>
      </div>
    </div>` : ''}

    <div class="card">
      <div class="grid2">
        ${detailField(c,'name','Sponsor / Prospect name')}
        ${detailSelect(c,'type','Type',['Renewal','Renewal / Upgrade','New Prospect'])}
        ${detailField(c,'contactName','Contact name')}
        ${detailField(c,'title','Title')}
        ${detailField(c,'email','Email')}
        ${detailField(c,'phone','Phone')}
        ${detailField(c,'htiPOC','HTI POC')}
        ${detailField(c,'location','Location / Context')}
        ${detailSelect(c,'priority','Priority',PRIORITY_OPTIONS)}
        ${detailField(c,'priorDonation','Prior donation ($)','number')}
        ${detailField(c,'suggestedAsk','Suggested ask ($)','number')}
        ${detailField(c,'fallbackAsk','Fallback ask ($)','number')}
        ${detailSelect(c,'status','Status',STATUS_OPTIONS)}
        ${detailSelect(c,'outcome','Outcome',OUTCOME_OPTIONS)}
        ${detailField(c,'committedAmount','Committed amount ($)','number')}
        ${detailSelect(c,'silentAuction','Silent auction item?',SILENT_OPTIONS)}
        ${detailField(c,'firstEmailDate','First email target date','date')}
        ${detailField(c,'lastContacted','Last contacted','date')}
        ${detailField(c,'followUpDate','Follow-up date','date')}
        ${detailField(c,'followUpMethod','Follow-up method')}
        ${detailField(c,'packet','Packet / attachment')}
        ${detailTextarea(c,'personalNotes','Personal knowledge / relationship notes')}
        ${detailTextarea(c,'messageAngle','Message angle')}
        ${detailTextarea(c,'nextAction','Next action')}
        ${detailTextarea(c,'notes','Notes')}
      </div>
      <div class="detail-actions">
        <button class="del-btn" onclick="deleteContact('${c.id}')">Remove contact</button>
        <button class="save-btn" onclick="saveCardForm('${c.id}')">Save changes</button>
      </div>
    </div>
  `;
}

function detailField(c, field, label, type='text'){
  const val = (c[field]??'').toString().replace(/"/g,'&quot;');
  return `<div class="field"><label>${label}</label><input id="f-${c.id}-${field}" type="${type}" value="${val}"></div>`;
}
function detailTextarea(c, field, label){
  return `<div class="field full"><label>${label}</label><textarea id="f-${c.id}-${field}">${c[field]??''}</textarea></div>`;
}
function detailSelect(c, field, label, opts){
  return `<div class="field"><label>${label}</label><select id="f-${c.id}-${field}">${opts.map(o=>`<option value="${o}" ${c[field]===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
}

loadData();
</script>
</body>
</html>
